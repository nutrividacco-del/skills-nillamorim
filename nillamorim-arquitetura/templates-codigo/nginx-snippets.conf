# =====================================================================
# NGINX SNIPPETS — Reutilizaveis
# =====================================================================
# Estes 2 snippets sao incluidos em CADA app.
# Lugar: /etc/nginx/snippets/
# =====================================================================

# ============== /etc/nginx/snippets/security-headers.conf ============
# Headers de seguranca padrao Imperatriz

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
# CSP basico - ajustar por app se precisar de mais
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;

# Esconder versao do Nginx
server_tokens off;


# ============== /etc/nginx/snippets/proxy-headers.conf ============
# Headers padrao quando faz reverse proxy

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Request-ID $request_id;  # correlation ID

# Suporte a WebSocket
proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# Timeouts razoaveis
proxy_connect_timeout 10s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;

# Buffers
proxy_buffering on;
proxy_buffer_size 16k;
proxy_buffers 8 16k;
