# =====================================================================
# DOCKER COMPOSE — Multi-App Imperatriz
# =====================================================================
# Roda todos os apps internos da Tata + bancos compartilhados.
# Lugar: /opt/imperatriz/docker-compose.yml
# Subir: docker compose up -d
# Logs: docker compose logs -f [service]
# =====================================================================

version: '3.9'

services:
  # ============== BANCOS COMPARTILHADOS ============

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: imperatriz
      POSTGRES_DB: imperatriz_main
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - imperatriz_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imperatriz"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Backup automatico via cron no host (ver scripts/backup-postgres.sh)

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - imperatriz_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============== APPS DA TATA ============

  marketing-command:
    build: ./apps/marketing-command
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_NAME: marketing-command
      DATABASE_URL: postgresql://imperatriz:${POSTGRES_PASSWORD}@postgres:5432/marketing_command
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:3000:3000"  # so localhost; Nginx exterioriza
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - imperatriz_net

  app-tarefas:
    build: ./apps/app-tarefas
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3920
      APP_NAME: app-tarefas
      DATABASE_URL: postgresql://imperatriz:${POSTGRES_PASSWORD}@postgres:5432/app_tarefas
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "127.0.0.1:3920:3920"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - imperatriz_net

  # WORKER do app-tarefas (separado!)
  app-tarefas-worker:
    build: ./apps/app-tarefas
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      APP_NAME: app-tarefas-worker
      DATABASE_URL: postgresql://imperatriz:${POSTGRES_PASSWORD}@postgres:5432/app_tarefas
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      app-tarefas: { condition: service_started }
    networks:
      - imperatriz_net

  # Adicione outros apps copiando o bloco acima
  # mapa-do-potencial:
  #   build: ./apps/mapa-do-potencial
  #   ...

# ============== VOLUMES ============
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============== REDE ============
networks:
  imperatriz_net:
    driver: bridge

# =====================================================================
# ARQUIVO .env (criar ao lado do docker-compose.yml)
# =====================================================================
# POSTGRES_PASSWORD=senhafortqui
# REDIS_PASSWORD=outrasenhaforteaqui
# JWT_SECRET=use_node_-e_"console.log(require('crypto').randomBytes(64).toString('hex'))"
# GEMINI_API_KEY=sua_chave_aqui
# =====================================================================
