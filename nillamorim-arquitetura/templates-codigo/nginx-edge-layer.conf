# =====================================================================
# NGINX EDGE LAYER — Padrão Imperatriz
# =====================================================================
# Este e o "porteiro central" da Tata. Cuida de SSL, rate-limit,
# headers de seguranca e roteamento pra todos os apps internos.
#
# Lugar: /etc/nginx/sites-available/edge-layer.conf
# Ativar: ln -s ../sites-available/edge-layer.conf /etc/nginx/sites-enabled/
# Testar: nginx -t
# Recarregar: systemctl reload nginx
# =====================================================================

# ============== RATE LIMIT ZONES (definir UMA VEZ no nginx.conf) ============
# Coloque estas linhas em /etc/nginx/nginx.conf dentro do bloco http {}:
#
# limit_req_zone $binary_remote_addr zone=geral:10m rate=10r/s;
# limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=api_pesada:10m rate=1r/s;
# ============================================================================

# ============== HTTP -> HTTPS (forca redirect) ============
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ============== APP 1: comando.iacomtata.com.br ============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name comando.iacomtata.com.br;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/comando.iacomtata.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comando.iacomtata.com.br/privkey.pem;

    # Headers de seguranca padronizados
    include /etc/nginx/snippets/security-headers.conf;

    # Logs
    access_log /var/log/nginx/comando.access.log;
    error_log /var/log/nginx/comando.error.log;

    # Rate limit
    limit_req zone=geral burst=20 nodelay;
    limit_req_status 429;

    # Rate limit ESPECIFICO pro endpoint de login
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Rate limit ESPECIFICO pra rotas pesadas (IA)
    location /api/ia/ {
        limit_req zone=api_pesada burst=2 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
        proxy_read_timeout 120s;  # IA demora
    }

    # Healthcheck (sem rate-limit pra UptimeRobot funcionar)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        include /etc/nginx/snippets/proxy-headers.conf;
        access_log off;
    }

    # Resto do app
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
}

# ============== APP 2: tarefas.mentoriaimperioia.com ============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tarefas.mentoriaimperioia.com;

    ssl_certificate /etc/letsencrypt/live/tarefas.mentoriaimperioia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarefas.mentoriaimperioia.com/privkey.pem;

    include /etc/nginx/snippets/security-headers.conf;

    access_log /var/log/nginx/tarefas.access.log;
    error_log /var/log/nginx/tarefas.error.log;

    limit_req zone=geral burst=20 nodelay;

    # Upload de audio do WhatsApp pode ser grande
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3920;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
}

# ============== Replicar pra cada app ============
# Copie o bloco acima trocando server_name, port e cert paths
