# =====================================================================
# GitHub Actions: Deploy via SSH + Docker — Padrão Imperatriz
# =====================================================================
# Lugar: .github/workflows/deploy.yml
#
# Funciona assim:
# 1. Push pra main → build Docker image
# 2. Image vai pro registry (GitHub Container Registry, free)
# 3. SSH pra VPS → pull nova image → docker compose up -d
# =====================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite rodar manual

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint || echo "skip"

      - name: Tests
        run: npm test || echo "skip"

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/imperatriz
            docker compose pull ${{ github.event.repository.name }}
            docker compose up -d --no-deps ${{ github.event.repository.name }}
            docker image prune -f

      - name: Healthcheck
        run: |
          sleep 10
          curl -f https://${{ secrets.APP_DOMAIN }}/health || exit 1

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": ":fire: Deploy falhou: ${{ github.event.repository.name }}\n${{ github.event.head_commit.message }}"
            }

# =====================================================================
# SECRETS NECESSARIOS (em Settings > Secrets and variables > Actions)
# =====================================================================
# VPS_HOST       — IP da VPS
# VPS_USER       — usuario SSH (geralmente 'tata' ou 'deploy')
# VPS_SSH_KEY    — chave privada SSH (gerar uma so pra deploy)
# VPS_PORT       — porta SSH (opcional, default 22)
# APP_DOMAIN     — comando.iacomtata.com.br
# SLACK_WEBHOOK  — opcional, pra notificacao
# =====================================================================
